<!DOCTYPE html>
<html>

<head>

<title>ShadowRecon</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="topbar">

<input id="target" placeholder="Enter domain (example.com)">
<button onclick="searchTarget()">SEARCH</button>

</div>

<div class="main">

<div class="webview">
<iframe id="browser"></iframe>
</div>

<div class="recon">

<h3>IP Address</h3>
<div id="ip">-</div>

<h3>Ports</h3>
<div id="ports"></div>

<h3>Subdomains</h3>
<div id="subdomains"></div>

<h3>Pages</h3>
<div id="pages"></div>

<h3>Hidden Directories</h3>
<div id="dirs"></div>

<h3>Technology</h3>
<div id="tech"></div>

</div>

</div>

<div class="graph">
<canvas id="trafficChart"></canvas>
</div>

<div class="terminal">
<div id="logs">Terminal ready...</div>
</div>

<script src="renderer.js"></script>

</body>
</html>
